kind: usecaseapi.manifest/v1
metadata:
  name: janken
runtime:
  language: python
  python: ">=3.12,<3.15"
  protocol: usecaseapi.inprocess.async_call/v1
layout:
  contracts_root: src
  implementations_root: src
  package: packages
usecases:
  - name: packages.janken.start_janken_session
    version: 1
    key: packages.janken.start_janken_session@v1
    description: じゃんけん単体の新しいメモリ上セッションを開始する。
    stable: true
    deprecated: false
    tags:
      - janken
      - session
    protocol:
      kind: usecaseapi.inprocess.async_call/v1
      signature: "async __call__(input: StartJankenSessionUseCaseInput) -> StartJankenSessionUseCaseOutput"
    source:
      contract_module: packages.janken.usecases.start_janken_session.v1.start_janken_session_contract
      protocol_class: StartJankenSession
      implementation_class: StartJankenSessionUseCase
      implementation_file: src/packages/janken/usecases/start_janken_session/v1/start_janken_session_usecase.py
      ref: START_JANKEN_SESSION_USECASE
      contract_file: src/packages/janken/usecases/start_janken_session/v1/start_janken_session_contract.py
    input: StartJankenSessionUseCaseInput
    output: StartJankenSessionUseCaseOutput
    models:
      - name: StartJankenSessionUseCaseInput
        description: じゃんけんセッション開始に必要な入力を表す。
        fields: []
      - name: StartJankenSessionUseCaseOutput
        description: 開始されたじゃんけんセッションの識別子と初期状態を表す。
        fields:
          - name: session_id
            type: str
            required: true
            description: アプリケーション実行中のメモリ上でセッションを識別する値。
          - name: status
            type: "Literal['waiting_for_user_hand']"
            required: true
            description: じゃんけんの手入力待ちであることを示す状態。
          - name: message
            type: str
            required: true
            description: CLI または HTTP で利用する利用者向けメッセージ。
    errors: []
    raises: []
    known_errors: []
    uses: []

  - name: packages.janken.play_janken_hand
    version: 1
    key: packages.janken.play_janken_hand@v1
    description: 既存のじゃんけんセッションにユーザーの手を適用し、システムの手と勝敗を返す。
    stable: true
    deprecated: false
    tags:
      - janken
      - game-step
    protocol:
      kind: usecaseapi.inprocess.async_call/v1
      signature: "async __call__(input: PlayJankenHandUseCaseInput) -> PlayJankenHandUseCaseOutput"
    source:
      contract_module: packages.janken.usecases.play_janken_hand.v1.play_janken_hand_contract
      protocol_class: PlayJankenHand
      implementation_class: PlayJankenHandUseCase
      implementation_file: src/packages/janken/usecases/play_janken_hand/v1/play_janken_hand_usecase.py
      ref: PLAY_JANKEN_HAND_USECASE
      contract_file: src/packages/janken/usecases/play_janken_hand/v1/play_janken_hand_contract.py
    input: PlayJankenHandUseCaseInput
    output: PlayJankenHandUseCaseOutput
    models:
      - name: PlayJankenHandUseCaseInput
        description: じゃんけんセッションを 1 手進めるための入力を表す。
        fields:
          - name: session_id
            type: str
            required: true
            description: 対象のじゃんけんセッションを識別する値。
          - name: user_hand
            type: "Literal['グー', 'チョキ', 'パー']"
            required: true
            description: ユーザーが出すじゃんけんの手。
      - name: PlayJankenHandUseCaseOutput
        description: じゃんけん 1 手分のシステム入力、勝敗、次状態を表す。
        fields:
          - name: session_id
            type: str
            required: true
            description: 対象のじゃんけんセッションを識別する値。
          - name: user_hand
            type: "Literal['グー', 'チョキ', 'パー']"
            required: true
            description: 判定に使用されたユーザーの手。
          - name: system_hand
            type: "Literal['グー', 'チョキ', 'パー']"
            required: true
            description: 判定に使用されたシステムの手。
          - name: result
            type: "Literal['ユーザーの勝ち', 'ユーザーの負け', 'あいこ']"
            required: true
            description: じゃんけん 1 手分の勝敗。
          - name: status
            type: "Literal['waiting_for_user_hand', 'finished']"
            required: true
            description: あいこなら継続、勝敗確定なら終了を示す状態。
          - name: message
            type: str
            required: true
            description: CLI または HTTP で利用する利用者向けメッセージ。
    errors:
      - name: JankenSessionError
        code: packages.janken.play_janken_hand.session_error
        base: UseCaseError
        description: じゃんけんセッション操作で公開境界に出す基底エラー。
      - name: InvalidJankenHandError
        code: packages.janken.play_janken_hand.invalid_hand
        base: JankenSessionError
        description: 受け付け対象外のじゃんけんの手が指定された場合のエラー。
      - name: JankenSessionNotFoundError
        code: packages.janken.play_janken_hand.session_not_found
        base: JankenSessionError
        description: 指定されたじゃんけんセッションが存在しない場合のエラー。
      - name: JankenSessionAlreadyFinishedError
        code: packages.janken.play_janken_hand.session_already_finished
        base: JankenSessionError
        description: 終了済みのじゃんけんセッションに入力された場合のエラー。
    raises:
      - JankenSessionError
    known_errors:
      - InvalidJankenHandError
      - JankenSessionNotFoundError
      - JankenSessionAlreadyFinishedError
    uses: []

  - name: packages.acchi_muite_hoi.start_acchi_muite_hoi_session
    version: 1
    key: packages.acchi_muite_hoi.start_acchi_muite_hoi_session@v1
    description: あっち向いてほいの新しいメモリ上セッションを開始する。
    stable: true
    deprecated: false
    tags:
      - acchi-muite-hoi
      - session
    protocol:
      kind: usecaseapi.inprocess.async_call/v1
      signature: "async __call__(input: StartAcchiMuiteHoiSessionUseCaseInput) -> StartAcchiMuiteHoiSessionUseCaseOutput"
    source:
      contract_module: packages.acchi_muite_hoi.usecases.start_acchi_muite_hoi_session.v1.start_acchi_muite_hoi_session_contract
      protocol_class: StartAcchiMuiteHoiSession
      implementation_class: StartAcchiMuiteHoiSessionUseCase
      implementation_file: src/packages/acchi_muite_hoi/usecases/start_acchi_muite_hoi_session/v1/start_acchi_muite_hoi_session_usecase.py
      ref: START_ACCHI_MUITE_HOI_SESSION_USECASE
      contract_file: src/packages/acchi_muite_hoi/usecases/start_acchi_muite_hoi_session/v1/start_acchi_muite_hoi_session_contract.py
    input: StartAcchiMuiteHoiSessionUseCaseInput
    output: StartAcchiMuiteHoiSessionUseCaseOutput
    models:
      - name: StartAcchiMuiteHoiSessionUseCaseInput
        description: あっち向いてほいセッション開始に必要な入力を表す。
        fields: []
      - name: StartAcchiMuiteHoiSessionUseCaseOutput
        description: 開始されたあっち向いてほいセッションの識別子と初期状態を表す。
        fields:
          - name: session_id
            type: str
            required: true
            description: アプリケーション実行中のメモリ上でセッションを識別する値。
          - name: status
            type: "Literal['waiting_for_janken_hand']"
            required: true
            description: じゃんけんの手入力待ちであることを示す状態。
          - name: message
            type: str
            required: true
            description: CLI または HTTP で利用する利用者向けメッセージ。
    errors: []
    raises: []
    known_errors: []
    uses: []

  - name: packages.acchi_muite_hoi.play_acchi_muite_hoi_turn
    version: 1
    key: packages.acchi_muite_hoi.play_acchi_muite_hoi_turn@v1
    description: あっち向いてほいセッションの現在状態に応じて、じゃんけんまたは方向勝負を 1 ステップ進める。
    stable: true
    deprecated: false
    tags:
      - acchi-muite-hoi
      - game-step
    protocol:
      kind: usecaseapi.inprocess.async_call/v1
      signature: "async __call__(input: PlayAcchiMuiteHoiTurnUseCaseInput) -> PlayAcchiMuiteHoiTurnUseCaseOutput"
    source:
      contract_module: packages.acchi_muite_hoi.usecases.play_acchi_muite_hoi_turn.v1.play_acchi_muite_hoi_turn_contract
      protocol_class: PlayAcchiMuiteHoiTurn
      implementation_class: PlayAcchiMuiteHoiTurnUseCase
      implementation_file: src/packages/acchi_muite_hoi/usecases/play_acchi_muite_hoi_turn/v1/play_acchi_muite_hoi_turn_usecase.py
      ref: PLAY_ACCHI_MUITE_HOI_TURN_USECASE
      contract_file: src/packages/acchi_muite_hoi/usecases/play_acchi_muite_hoi_turn/v1/play_acchi_muite_hoi_turn_contract.py
    input: PlayAcchiMuiteHoiTurnUseCaseInput
    output: PlayAcchiMuiteHoiTurnUseCaseOutput
    models:
      - name: PlayAcchiMuiteHoiTurnUseCaseInput
        description: あっち向いてほいセッションを現在状態に応じて 1 ステップ進めるための入力を表す。
        fields:
          - name: session_id
            type: str
            required: true
            description: 対象のあっち向いてほいセッションを識別する値。
          - name: user_hand
            type: "Literal['グー', 'チョキ', 'パー'] | None"
            required: true
            description: じゃんけんの手入力待ち状態で指定するユーザーの手。
          - name: user_direction
            type: "Literal['上', '下', '右', '左'] | None"
            required: true
            description: 方向入力待ち状態で指定するユーザーの方向。
      - name: PlayAcchiMuiteHoiTurnUseCaseOutput
        description: あっち向いてほい 1 ステップ分の判定結果と次状態を表す。
        fields:
          - name: session_id
            type: str
            required: true
            description: 対象のあっち向いてほいセッションを識別する値。
          - name: status
            type: "Literal['waiting_for_janken_hand', 'waiting_for_look_direction', 'finished']"
            required: true
            description: 次に必要な入力、または最終勝敗確定を示す状態。
          - name: janken_result
            type: "Literal['ユーザーの勝ち', 'ユーザーの負け', 'あいこ'] | None"
            required: true
            description: じゃんけんを実行したステップでの勝敗。
          - name: initiative
            type: "Literal['user', 'system'] | None"
            required: true
            description: 方向勝負に進む場合の主導権の所在。
          - name: user_hand
            type: "Literal['グー', 'チョキ', 'パー'] | None"
            required: true
            description: じゃんけんを実行したステップで判定に使用されたユーザーの手。
          - name: system_hand
            type: "Literal['グー', 'チョキ', 'パー'] | None"
            required: true
            description: じゃんけんを実行したステップで判定に使用されたシステムの手。
          - name: user_direction
            type: "Literal['上', '下', '右', '左'] | None"
            required: true
            description: 方向勝負を実行したステップで判定に使用されたユーザーの方向。
          - name: system_direction
            type: "Literal['上', '下', '右', '左'] | None"
            required: true
            description: 方向勝負を実行したステップで判定に使用されたシステムの方向。
          - name: final_result
            type: "Literal['ユーザーの勝ち', 'ユーザーの負け'] | None"
            required: true
            description: 最終勝敗が確定した場合の結果。
          - name: message
            type: str
            required: true
            description: CLI または HTTP で利用する利用者向けメッセージ。
    errors:
      - name: AcchiMuiteHoiSessionError
        code: packages.acchi_muite_hoi.play_acchi_muite_hoi_turn.session_error
        base: UseCaseError
        description: あっち向いてほいセッション操作で公開境界に出す基底エラー。
      - name: InvalidAcchiMuiteHoiHandError
        code: packages.acchi_muite_hoi.play_acchi_muite_hoi_turn.invalid_hand
        base: AcchiMuiteHoiSessionError
        description: 受け付け対象外のじゃんけんの手が指定された場合のエラー。
      - name: InvalidAcchiMuiteHoiDirectionError
        code: packages.acchi_muite_hoi.play_acchi_muite_hoi_turn.invalid_direction
        base: AcchiMuiteHoiSessionError
        description: 受け付け対象外の方向が指定された場合のエラー。
      - name: AcchiMuiteHoiSessionNotFoundError
        code: packages.acchi_muite_hoi.play_acchi_muite_hoi_turn.session_not_found
        base: AcchiMuiteHoiSessionError
        description: 指定されたあっち向いてほいセッションが存在しない場合のエラー。
      - name: AcchiMuiteHoiSessionAlreadyFinishedError
        code: packages.acchi_muite_hoi.play_acchi_muite_hoi_turn.session_already_finished
        base: AcchiMuiteHoiSessionError
        description: 終了済みのあっち向いてほいセッションに入力された場合のエラー。
      - name: AcchiMuiteHoiInputStateMismatchError
        code: packages.acchi_muite_hoi.play_acchi_muite_hoi_turn.input_state_mismatch
        base: AcchiMuiteHoiSessionError
        description: 現在状態と入力内容が一致しない場合のエラー。
    raises:
      - AcchiMuiteHoiSessionError
    known_errors:
      - InvalidAcchiMuiteHoiHandError
      - InvalidAcchiMuiteHoiDirectionError
      - AcchiMuiteHoiSessionNotFoundError
      - AcchiMuiteHoiSessionAlreadyFinishedError
      - AcchiMuiteHoiInputStateMismatchError
    uses: []
