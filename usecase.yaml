components:
  schemas:
    PackagesAcchiMuiteHoiPlayAcchiMuiteHoiTurnV1PlayAcchiMuiteHoiTurnUseCaseInput:
      title: PlayAcchiMuiteHoiTurnUseCaseInput
      description: あっち向いてほいセッションを現在状態に応じて 1 ステップ進めるための入力を表す。
      type: object
      additionalProperties: false
      required:
      - session_id
      - user_hand
      - user_direction
      properties:
        session_id:
          type: string
          description: 対象のあっち向いてほいセッションを識別する値。
        user_hand:
          anyOf:
          - enum:
            - グー
            - チョキ
            - パー
          - type: 'null'
          description: じゃんけんの手入力待ち状態で指定するユーザーの手。
        user_direction:
          anyOf:
          - enum:
            - 上
            - 下
            - 右
            - 左
          - type: 'null'
          description: 方向入力待ち状態で指定するユーザーの方向。
      x-usecaseapi:
        kind: input
        canonicalName: packages.acchi_muite_hoi.play_acchi_muite_hoi_turn.v1.PlayAcchiMuiteHoiTurnUseCaseInput
        bindings:
          python:
            class: PlayAcchiMuiteHoiTurnUseCaseInput
    PackagesAcchiMuiteHoiPlayAcchiMuiteHoiTurnV1PlayAcchiMuiteHoiTurnUseCaseOutput:
      title: PlayAcchiMuiteHoiTurnUseCaseOutput
      description: あっち向いてほい 1 ステップ分の判定結果と次状態を表す。
      type: object
      additionalProperties: false
      required:
      - session_id
      - status
      - janken_result
      - initiative
      - user_hand
      - system_hand
      - user_direction
      - system_direction
      - final_result
      - message
      properties:
        session_id:
          type: string
          description: 対象のあっち向いてほいセッションを識別する値。
        status:
          enum:
          - waiting_for_janken_hand
          - waiting_for_look_direction
          - finished
          description: 次に必要な入力、または最終勝敗確定を示す状態。
        janken_result:
          anyOf:
          - enum:
            - ユーザーの勝ち
            - ユーザーの負け
            - あいこ
          - type: 'null'
          description: じゃんけんを実行したステップでの勝敗。
        initiative:
          anyOf:
          - enum:
            - user
            - system
          - type: 'null'
          description: 方向勝負に進む場合の主導権の所在。
        user_hand:
          anyOf:
          - enum:
            - グー
            - チョキ
            - パー
          - type: 'null'
          description: じゃんけんを実行したステップで判定に使用されたユーザーの手。
        system_hand:
          anyOf:
          - enum:
            - グー
            - チョキ
            - パー
          - type: 'null'
          description: じゃんけんを実行したステップで判定に使用されたシステムの手。
        user_direction:
          anyOf:
          - enum:
            - 上
            - 下
            - 右
            - 左
          - type: 'null'
          description: 方向勝負を実行したステップで判定に使用されたユーザーの方向。
        system_direction:
          anyOf:
          - enum:
            - 上
            - 下
            - 右
            - 左
          - type: 'null'
          description: 方向勝負を実行したステップで判定に使用されたシステムの方向。
        final_result:
          anyOf:
          - enum:
            - ユーザーの勝ち
            - ユーザーの負け
          - type: 'null'
          description: 最終勝敗が確定した場合の結果。
        message:
          type: string
          description: CLI または HTTP で利用する利用者向けメッセージ。
      x-usecaseapi:
        kind: output
        canonicalName: packages.acchi_muite_hoi.play_acchi_muite_hoi_turn.v1.PlayAcchiMuiteHoiTurnUseCaseOutput
        bindings:
          python:
            class: PlayAcchiMuiteHoiTurnUseCaseOutput
